<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="setting">
        <div class="tab">
            <label for="">难度</label>
            <select name="" id="">
                <option value="">简单</option>
                <option value="">中等</option>
                <option value="">困难</option>
            </select>
        </div>
    
    </div>
    <div class="content">
        <div class="words">
            <span>文字游戏</span>
        <button class="begin" >开始游戏</button>
        </div>
    </div>
    <div class="game">
        <div class="test">
            <p>敲出下列内容：</p>
            <h1 class="text">Ailerx</h1>
            <input type="text" class="answer">
        </div>
        <div class="message">
            <p class="time">剩余时间：<span>10秒</span></p>
            <p class="score">得分 <span>0</span></p>
        </div>
    </div>
    <button class="btn-set">设置</button>
    <a href="../index.html" class="backMain">返回</a>
    <script src="./javascript.js"></script>
</body>
</html>
